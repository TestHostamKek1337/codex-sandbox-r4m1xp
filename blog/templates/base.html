<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_settings.site_title }}{% endblock %}</title>
    <meta name="description" content="{{ site_settings.site_tagline }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="{{ url_for('public.home') }}">
          <span class="brand-mark"></span>
          <span>
            <strong>{{ site_settings.site_title }}</strong>
            <small>{{ site_settings.site_tagline }}</small>
          </span>
        </a>
        <nav class="topnav">
          <a href="{{ url_for('public.home') }}">Блог</a>
          <a href="{{ url_for('admin.dashboard') }}">Админка</a>
        </nav>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
